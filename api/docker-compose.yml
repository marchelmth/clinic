services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinic_app
    working_dir: /var/www
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: sh -lc "chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache && exec php-fpm -F"
    volumes:
      - .:/var/www
    depends_on:
      - db

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinic_queue_worker
    working_dir: /var/www
    dns:
      - 8.8.8.8
      - 1.1.1.1
    command: php artisan queue:work --tries=3 --timeout=90
    restart: always
    volumes:
      - .:/var/www
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: clinic_db
    restart: always
    environment:
      MYSQL_DATABASE: clinic
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - "8000:80"
    environment:
      - PMA_ARBITRARY=1

  webserver:
    image: nginx:alpine
    container_name: clinic_nginx
    ports:
      - "3000:80"
    volumes:
      - .:/var/www
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      - app
      
volumes:
  db_data:
